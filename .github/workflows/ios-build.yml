name: iOS Build & Test

on:
  push:
    branches: [main]
    paths:
      - '.gitmodules'
      - 'apps/ios-native/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [main]
    paths:
      - '.gitmodules'
      - 'apps/ios-native/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-and-test:
    name: Build and Test iOS App
    runs-on: macos-14
    env:
      IOS_PROJECT: apps/ios-native/IOS RunSmart app.xcodeproj
      IOS_SCHEME: IOS RunSmart app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout native iOS app
        run: git submodule update --init --depth 1 apps/ios-native

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios-native/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project "$IOS_PROJECT" -scheme "$IOS_SCHEME"

      - name: Select iOS simulator
        id: select-simulator
        run: |
          IOS_SIMULATOR_NAME="$(ruby apps/ios-native/scripts/select-simulator.rb iphone)"
          echo "Using simulator: $IOS_SIMULATOR_NAME"
          echo "ios_simulator_name=$IOS_SIMULATOR_NAME" >> "$GITHUB_OUTPUT"

      - name: Build iOS app
        run: |
          xcodebuild clean build \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -destination 'platform=iOS Simulator,name=${{ steps.select-simulator.outputs.ios_simulator_name }}' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            apps/ios-native/build/reports/
            apps/ios-native/build/logs/

name: iOS Build & Test

on:
  push:
    branches: [iOS-application, main]
    paths:
      - 'apps/ios/**'
      - 'packages/shared/**'
      - 'v0/package.json'
      - 'v0/package-lock.json'
      - 'v0/capacitor.config.ts'
      - 'v0/capacitor-fallback/**'
      - 'v0/lib/capacitor-platform.ts'
      - 'v0/lib/native/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    branches: [iOS-application, main]
    paths:
      - 'apps/ios/**'
      - 'packages/shared/**'
      - 'v0/package.json'
      - 'v0/package-lock.json'
      - 'v0/capacitor.config.ts'
      - 'v0/capacitor-fallback/**'
      - 'v0/lib/capacitor-platform.ts'
      - 'v0/lib/native/**'

jobs:
  build-and-test:
    name: Build and Test iOS App
    runs-on: macos-14
    env:
      IOS_PROJECT: apps/ios/App/App.xcodeproj
      IOS_SCHEME: App

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'v0/package-lock.json'

      - name: Install dependencies
        run: |
          cd v0
          npm install
          cd ../packages/shared
          npm install

      - name: Generate Swift types
        run: |
          cd packages/shared
          npm run generate:swift

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('apps/ios/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies -project "$IOS_PROJECT" -scheme "$IOS_SCHEME"

      - name: Build iOS app
        run: |
          xcodebuild clean build \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.3' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=26.3' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            apps/ios/build/reports/
            apps/ios/build/logs/
